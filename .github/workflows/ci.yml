name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python contract, backend, and adapters
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install backend and pinned framework lanes
        run: python -m pip install -e '.[dev,pipecat-groq,livekit]'
      - name: Smoke-import headless Pipecat providers
        run: >-
          python -c "from pipecat.services.groq.llm import GroqLLMService;
          from pipecat.services.groq.stt import GroqSTTService;
          from pipecat.services.groq.tts import GroqTTSService"
      - name: Check generated contracts
        run: |
          python scripts/generate_contract.py --check
          python scripts/generate_openapi.py --check
          python scripts/check_semconv.py
      - name: Lint
        run: |
          ruff check packages/sdk-python/src packages/sdk-python/tests apps/ingest scripts examples
          ruff format --check packages/sdk-python/src packages/sdk-python/tests apps/ingest scripts examples
      - name: Test with branch coverage
        run: pytest --cov=earshot --cov-report=term-missing -q

  python-compatibility:
    name: Python ${{ matrix.python-version }} adapter conformance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependency-free adapter test environment
        run: python -m pip install -e '.[dev]'
      - name: Exercise every raw and finalized adapter public seam
        run: >-
          pytest -q
          packages/sdk-python/tests/test_adapter_conformance.py
          apps/ingest/tests/test_finalized_adapter_conformance.py

  framework-compatibility:
    name: ${{ matrix.integration }} ${{ matrix.lane }} compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - integration: pipecat
            lane: minimum
            dependency: pipecat-ai[tracing]==1.5.0
          - integration: pipecat
            lane: current
            dependency: pipecat-ai[tracing]>=1.5.0,<1.6
          - integration: livekit
            lane: minimum
            dependency: livekit-agents==1.6.5
          - integration: livekit
            lane: current
            dependency: livekit-agents>=1.6.5,<1.7
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install framework dependency lane
        env:
          FRAMEWORK_DEPENDENCY: ${{ matrix.dependency }}
        run: |
          python -m pip install -e '.[dev]'
          python -m pip install --upgrade "$FRAMEWORK_DEPENDENCY"
      - name: Exercise real framework objects and conformance fixtures
        run: |
          pytest -q apps/ingest/tests/test_framework_integrations.py \
            -k '${{ matrix.integration }}'
          pytest -q packages/sdk-python/tests/test_adapter_conformance.py \
            -k '${{ matrix.integration }}'

  macos-smoke:
    name: macOS framework smoke
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install newest supported framework dependencies
        run: python -m pip install --upgrade -e '.[dev,pipecat,livekit]'
      - name: Exercise public seams and real dependency models
        run: |
          pytest -q packages/sdk-python/tests/test_adapter_conformance.py
          pytest -q apps/ingest/tests/test_framework_integrations.py \
            -k 'metric_models_are_consumed_as_real_objects or real_readable_spans_have_lifecycle_root_and_sibling_stages'

  artifacts:
    name: Clean wheel and source distribution
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Build viewer and release artifacts from a clean checkout
        run: |
          python -m pip install 'build>=1.2,<2'
          pnpm install --frozen-lockfile
          pnpm --filter @earshot/viewer bundle
          mkdir -p local/sdist-sentinel
          printf '%s\n' 'CI adversarial sentinel: this file must not ship' \
            > local/sdist-sentinel/SHOULD_NOT_SHIP.md
          python -m build --wheel --sdist --outdir dist
      - name: Inspect artifact contents and dependency metadata
        run: |
          python scripts/check_wheel.py dist/*.whl
          python scripts/check_sdist.py dist/*.tar.gz
      - name: Install and smoke base and server variants
        run: |
          python scripts/smoke_artifact.py dist/*.whl
          python scripts/smoke_artifact.py dist/*.tar.gz

  typescript:
    name: TypeScript compatibility packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Check generated viewer API types
        run: |
          pnpm --filter @earshot/viewer gen:api
          git diff --exit-code -- apps/viewer/src/api/schema.d.ts
      - name: Test, typecheck, build, and format
        run: |
          pnpm test
          pnpm typecheck
          pnpm build
          pnpm format:check

  container:
    name: Single-image smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Build and exercise hardened container
        run: sh scripts/smoke-container.sh
