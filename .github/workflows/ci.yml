name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python contract, backend, and adapters
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install backend and pinned framework lanes
        run: python -m pip install -e '.[dev,pipecat-groq,livekit]'
      - name: Smoke-import headless Pipecat providers
        run: >-
          python -c "from pipecat.services.groq.llm import GroqLLMService;
          from pipecat.services.groq.stt import GroqSTTService;
          from pipecat.services.groq.tts import GroqTTSService"
      - name: Check generated contracts
        run: |
          python scripts/generate_contract.py --check
          python scripts/generate_openapi.py --check
          python scripts/check_semconv.py
      - name: Lint
        run: ruff check packages/sdk-python/src packages/sdk-python/tests apps/ingest scripts examples
      - name: Test with branch coverage
        run: pytest --cov=earshot --cov-report=term-missing -q
      - name: Build installable wheel
        run: python -m pip wheel --no-deps . --wheel-dir dist

  typescript:
    name: TypeScript compatibility packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Test, typecheck, build, and format
        run: |
          pnpm test
          pnpm typecheck
          pnpm build
          pnpm format:check
