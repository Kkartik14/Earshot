name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release identity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      image: ${{ steps.release.outputs.image }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Match the tag, package version, and image identity
        id: release
        env:
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: >-
          python scripts/check_release.py
          --tag "$RELEASE_TAG"
          --repository "$RELEASE_REPOSITORY"
          --github-output "$GITHUB_OUTPUT"
      - name: Require release tags to point into the default branch
        if: github.ref_type == 'tag'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch --no-tags origin "$DEFAULT_BRANCH"
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/$DEFAULT_BRANCH"; then
            echo "release tag must point to a commit contained in $DEFAULT_BRANCH" >&2
            exit 1
          fi

  build-python:
    name: Build and inspect Python distributions
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Build the viewer, wheel, and source distribution
        run: |
          python -m pip install 'build>=1.2,<2'
          pnpm install --frozen-lockfile
          pnpm --filter @earshot/viewer bundle
          python -m build --wheel --sdist --outdir dist
      - name: Inspect and smoke-test the distributions
        run: |
          python scripts/check_wheel.py dist/*.whl
          python scripts/check_sdist.py dist/*.tar.gz
          python scripts/smoke_artifact.py dist/*.whl
          python scripts/smoke_artifact.py dist/*.tar.gz
      - name: Upload immutable release inputs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish-container:
    name: Publish GHCR image
    if: github.ref_type == 'tag'
    needs: [validate, build-python]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive OCI tags and labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ needs.validate.outputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
          labels: |
            org.opencontainers.image.title=Earshot
            org.opencontainers.image.description=The open-source Voice Observability SDK
            org.opencontainers.image.licenses=Apache-2.0
      - name: Build and push the release image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
      - name: Attest the published image
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ needs.validate.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  publish-pypi:
    name: Publish to PyPI with OIDC
    if: github.ref_type == 'tag'
    needs: [validate, build-python, publish-container]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/earshot-observability
    permissions:
      id-token: write
    steps:
      - name: Download the inspected distributions
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: python-distributions
          path: dist
      - name: Publish the distributions
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1

  github-release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag'
    needs: [validate, build-python, publish-container, publish-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Download the published distributions
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: python-distributions
          path: dist
      - name: Attest the Python distributions
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/*
      - name: Create the release with generated notes and artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          args=(
            "$RELEASE_TAG"
            dist/*
            --verify-tag
            --generate-notes
            --title "Earshot $RELEASE_VERSION"
          )
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"
