version: 2

updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    labels: [dependencies, python]
    commit-message:
      prefix: deps(python)
    groups:
      python-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:15"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels: [dependencies, javascript]
    commit-message:
      prefix: deps(js)
    groups:
      javascript-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
    commit-message:
      prefix: deps(actions)
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:45"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels: [dependencies, docker]
    commit-message:
      prefix: deps(docker)
    groups:
      container-base-images:
        patterns: ["*"]
