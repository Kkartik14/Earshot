services:
  earshot:
    build: .
    image: earshot:local
    environment:
      EARSHOT_TOKEN: ${EARSHOT_TOKEN:?set EARSHOT_TOKEN to a high-entropy secret}
      EARSHOT_HOST: 0.0.0.0
      EARSHOT_BEHIND_TLS_PROXY: "true"
    ports:
      - "127.0.0.1:4319:4319"
    volumes:
      - earshot-data:/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  earshot-data:
